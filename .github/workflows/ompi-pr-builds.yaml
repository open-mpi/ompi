name: Build everything

# Build and test Open MPI on both Linux and macOS:
#
#   * Remove all .opal_ignore files so that even the normally-skipped
#     components are compiled.
#   * Force the Sphinx docs and the Fortran bindings to be built
#     (--enable-sphinx / --enable-mpi-fortran), installing the Python
#     packages Sphinx needs.
#   * Build, then "make check" (intentionally before "make install"),
#     then install.
#   * Build and run all of the examples in the examples/ directory.

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ompi-pr-builds:
    name: ${{ matrix.os }} ${{ matrix.config_name }}
    strategy:
      # Run both platforms to completion even if one fails.
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            config_name: default
            configure_options: >-
              --enable-sphinx
              --enable-mpi-fortran
              --disable-silent-rules
          - os: ubuntu-latest
            config_name: mca-dso
            configure_options: >-
              --enable-sphinx
              --enable-mpi-fortran
              --disable-silent-rules
              --enable-mca-dso
          - os: macos-latest
            config_name: default
            configure_options: >-
              --enable-sphinx
              --enable-mpi-fortran
              --disable-silent-rules
          - os: macos-latest
            config_name: mca-dso
            configure_options: >-
              --enable-sphinx
              --enable-mpi-fortran
              --disable-silent-rules
              --enable-mca-dso
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: 3

    - name: Install Python packages (Sphinx and friends)
      run: python -m pip install --upgrade pip -r docs/requirements.txt

    - name: Set up macOS build dependencies
      if: runner.os == 'macOS'
      run: |
        # Create a plain "gfortran" symlink (Homebrew installs it as
        # gfortran-NN).
        cd $(brew --prefix)/bin
        gfortran=$(ls gfortran-* | sort | head -n 1)
        sudo ln -s $gfortran gfortran
        # Autotools
        brew install autoconf automake libtool
        # Keep Homebrew's libevent from being picked up by configure
        brew unlink libevent || true

    - name: Set up Linux build dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
            autoconf automake libtool flex gfortran

    - name: Remove .opal_ignore files so that we build all components
      run: |
        find . -name .opal_ignore -exec rm -f {} \; -print

    - name: Build Open MPI (forcing Sphinx docs and Fortran bindings)
      run: |
        NCPU=$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)
        # Parallelize automake's Makefile.in generation during autogen.pl.
        export AUTOMAKE_JOBS=$NCPU
        ./autogen.pl
        ./configure --prefix=${PWD}/install ${{ matrix.configure_options }}
        make -j $NCPU

    - name: Run unit tests
      # Deliberately run "make check" BEFORE "make install".
      # VERBOSE=1 causes logs to be cat'ed if a test fails.
      run: make check VERBOSE=1

    - name: Install Open MPI
      run: make install

    - name: Add Open MPI to PATH
      run: echo "${PWD}/install/bin" >> "$GITHUB_PATH"

    - name: Run the MPI Standard ABI test suite
      # Run "make check-abi" after "make install": unlike the "check-fast"
      # suite that "make check" runs above, check-abi launches real MPI jobs
      # and so needs the installed mpirun (now on PATH).  VERBOSE=1 dumps each
      # failing probe's command + output (Automake-style) so failures here are
      # diagnosable from the CI log.
      env:
        # GitHub runners have very few cores, so the dynamic-process probes
        # (MPI_Comm_spawn / MPI_Comm_spawn_multiple) have no free slots to
        # spawn into ("All nodes which are allocated for this job are already
        # filled").  Let prte oversubscribe so it can place the spawned
        # children.
        PRTE_MCA_rmaps_default_mapping_policy: ":OVERSUBSCRIBE"
      run: make -C ompi/test/mpi-abi check-abi VERBOSE=1

    - name: Build all examples
      run: |
        cd examples
        make

    - name: Run all built examples
      run: |
        cd examples
        status=0

        # #####################################################################
        # ##### TEMPORARY WORKAROUND -- DROP THIS COMMIT WHEN               #####
        # ##### https://github.com/open-mpi/ompi/issues/14125 IS FIXED     #####
        # #####################################################################
        #
        # On macOS, repeated MPI Sessions usage (MPI_Session_init after a prior
        # MPI_Session_finalize) can deadlock: the second MPI_Session_init fails
        # to open() its shared-memory backing file (ENOENT) and then hangs
        # forever in the modex PMIx_Fence_nb wait.  The stock hello_sessions_c
        # example does exactly two init/finalize cycles and trips this.  See
        # open-mpi/ompi#14125 for the full root-cause analysis; it reproduces on
        # a clean main, so it is NOT caused by this PR.
        #
        # Without a timeout, that hang wedges this entire CI job until the
        # 6-hour GitHub Actions ceiling.  hello_sessions_c is the only affected
        # example, so wrap ONLY that one launch in a timeout: its hang becomes a
        # prompt, visible FAILURE (exit 124) while every other example runs
        # exactly as before.  NOTE: macOS runners have no coreutils `timeout` /
        # `gtimeout`, so this is a dependency-free bash version (background the
        # launcher, poll, and SIGKILL it -- which tears down its prterun
        # children -- on expiry).
        #
        # >>> To remove this workaround once #14125 is fixed: drop this commit.
        # >>> That restores the loop to calling the launcher directly for every
        # >>> example: if ! "$launcher" --map-by ppr:1:core "./$exe"; then
        EXAMPLE_TIMEOUT=120
        run_with_timeout() {
          local limit="$1"; shift
          "$@" &
          local pid=$! waited=0
          while kill -0 "$pid" 2>/dev/null; do
            sleep 2
            waited=$((waited + 2))
            if [ "$waited" -ge "$limit" ]; then
              echo "==== TIMED OUT after ${limit}s -- killing (see open-mpi/ompi#14125)"
              kill -9 "$pid" 2>/dev/null
              wait "$pid" 2>/dev/null
              return 124
            fi
          done
          wait "$pid"
        }
        # ############################ end workaround #########################

        # Run every example binary that was actually built.  Built
        # binaries are regular, executable, and have no filename
        # extension (this skips sources, Makefiles, and macOS .dSYM
        # bundles).  OpenSHMEM examples are launched with oshrun; all
        # others with mpirun.
        for exe in *; do
          [ -f "$exe" ] && [ -x "$exe" ] || continue
          case "$exe" in *.*) continue ;; esac
          case "$exe" in
            *oshmem*|oshmem_*) launcher=oshrun ;;
            *)                 launcher=mpirun ;;
          esac
          echo "==== Running $exe (via $launcher) ===="
          # WORKAROUND (open-mpi/ompi#14125): only hello_sessions_c can deadlock
          # on macOS (repeated MPI_Session_init/finalize), so run just that one
          # under a timeout; all other examples launch directly, unchanged.
          if [ "$exe" = "hello_sessions_c" ]; then
            run_with_timeout "$EXAMPLE_TIMEOUT" "$launcher" --map-by ppr:1:core "./$exe"
            rc=$?
          else
            "$launcher" --map-by ppr:1:core "./$exe"
            rc=$?
          fi
          if [ "$rc" -ne 0 ]; then
            echo "==== $exe FAILED"
            status=1
          fi
        done
        exit $status
